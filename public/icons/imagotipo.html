<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Erica+One&display=swap" rel="stylesheet">
  <style>
    .imagotipo {
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }
    .imagotipo__icono {
      display: block;
      height: 64px;
      width: auto;
    }
    .imagotipo__texto {
      font-family: "Erica One", sans-serif;
      font-weight: 400;
      font-style: normal;
      font-size: 40px;
      line-height: 1;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #E8C157;
    }
  </style>
</head>
<body>
  <div class="imagotipo">
    <img src="./@Poky.png" alt="Pato coronado — @Pokymon.dev" class="imagotipo__icono" />
    <span class="imagotipo__texto">FRONTEND</span>
  </div>
</body>
</html>
